<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Custom PC Specialist | Techfix</title>
  <meta name="description" content="Neem contact op met Techfix voor advies over high-end custom pc's, performance optimalisatie, gaming systemen en workstation builds." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://techfix.nl/contact/" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/styles.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { techfix: "#58C11D" }
        }
      }
    }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Techfix",
    "url": "https://techfix.nl/",
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+31638875473",
      "contactType": "customer support",
      "areaServed": "NL"
    }
  }
  </script>
</head>

<body class="bg-zinc-950 text-zinc-100">

<main class="mx-auto max-w-6xl px-6 py-20">

<h1 class="text-4xl font-semibold mb-10">Contact</h1>

<div class="grid gap-10 md:grid-cols-2">

<!-- CONTACT INFO -->
<div class="rounded-3xl border border-white/10 bg-white/5 p-8">
  <h2 class="text-xl font-semibold">Direct contact</h2>

  <div class="mt-6 space-y-6">

    <p>
      <span class="text-sm text-zinc-400">Telefoon</span><br>
      <a href="tel:+31638875473" class="text-techfix text-lg font-semibold">
        +31 6 38875473
      </a>
    </p>

    <p>
      <span class="text-sm text-zinc-400">WhatsApp</span><br>
      <a href="https://wa.me/31638875473" class="text-techfix text-lg font-semibold">
        Stuur een bericht
      </a>
    </p>

    <p>
      <span class="text-sm text-zinc-400">E-mail</span><br>
      <a href="mailto:info@techfix.nl" class="text-techfix text-lg font-semibold">
        info@techfix.nl
      </a>
    </p>

    <p class="text-sm text-zinc-400">
      Reactietijd meestal binnen 24 uur.
    </p>

  </div>
</div>

<!-- CTA -->
<div class="rounded-3xl border border-white/10 bg-white/5 p-8">
  <h2 class="text-xl font-semibold">Direct starten?</h2>

  <p class="mt-4 text-zinc-300">
    Wil je een high-end custom build zonder gedoe?
    Start direct je aanvraag of stuur een bericht.
  </p>

  <div class="mt-8 flex flex-col gap-3">
    <a href="/custom-build/" class="rounded-xl bg-techfix px-6 py-3 font-semibold text-black">
      Start jouw build
    </a>

    <a href="https://wa.me/31638875473" class="rounded-xl border border-white/10 px-6 py-3">
      WhatsApp direct
    </a>
  </div>
</div>

</div>

</main>

</body>
</html>
