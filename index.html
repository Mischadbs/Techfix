<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>High-End Custom Gaming PC's | Performance Engineering | Techfix</title>

  <link rel="stylesheet" href="assets/styles.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { techfix: "#58C11D" }
        }
      }
    }
  </script>

  <style>
    html, body { overflow-x: hidden; }
  </style>
</head>

<body class="min-h-screen bg-zinc-950 text-zinc-100">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 border-b border-white/10 bg-zinc-950/80 backdrop-blur-xl">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-3">
        <img src="assets/logo-light.png" class="h-10" />
      </a>

      <!-- Desktop nav -->
      <nav class="hidden md:flex gap-7 text-sm">
        <a href="/" class="text-techfix">Home</a>
        <a href="/performance-lab/" class="hover:text-techfix">Performance Lab</a>
        <a href="/builds/" class="hover:text-techfix">Builds</a>
        <a href="/knowledge/" class="hover:text-techfix">Knowledge</a>
        <a href="/custom-build/" class="hover:text-techfix">Custom Build</a>
        <a href="/contact/" class="hover:text-techfix">Contact</a>
      </nav>

      <!-- Right side -->
      <div class="flex items-center gap-3">

        <a href="/custom-build/" class="hidden md:inline-flex rounded-2xl bg-techfix px-4 py-2 text-sm font-semibold text-zinc-950">
          Start jouw build
        </a>

        <!-- HAMBURGER -->
        <button
          id="mobile-menu-button"
          class="md:hidden rounded-2xl border border-white/10 bg-white/5 p-3"
          aria-label="Menu"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>

      </div>
    </div>

    <!-- MOBILE MENU -->
    <div id="mobile-menu" class="hidden border-t border-white/10 bg-zinc-950">
      <nav class="flex flex-col px-5 py-4 text-sm">
        <a href="/" class="py-3 text-techfix">Home</a>
        <a href="/performance-lab/" class="py-3 hover:text-techfix">Performance Lab</a>
        <a href="/builds/" class="py-3 hover:text-techfix">Builds</a>
        <a href="/knowledge/" class="py-3 hover:text-techfix">Knowledge</a>
        <a href="/custom-build/" class="py-3 hover:text-techfix">Custom Build</a>
        <a href="/contact/" class="py-3 hover:text-techfix">Contact</a>

        <a href="/custom-build/" class="mt-3 rounded-2xl bg-techfix px-4 py-2 text-center font-semibold text-zinc-950">
          Start jouw build
        </a>
      </nav>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="max-w-6xl mx-auto px-5 py-20">
    <h1 class="text-4xl font-bold">Homepage</h1>
  </main>

  <!-- FOOTER -->
  <footer class="border-t border-white/10 mt-20">
    <div class="max-w-6xl mx-auto px-5 py-8 text-sm text-zinc-400">
      <div>
        <span class="text-white">Techfix</span> — Performance engineering voor high-end custom pc's

        <div class="mt-4 text-xs text-zinc-500">
          KvK: 57281408<br>
          BTW: NL155583700B01
        </div>
      </div>
    </div>
  </footer>

  <!-- SCRIPT -->
  <script>
    const btn = document.getElementById("mobile-menu-button");
    const menu = document.getElementById("mobile-menu");

    btn.addEventListener("click", () => {
      menu.classList.toggle("hidden");
    });
  </script>

</body>
</html>
