<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>High-End Custom Gaming PC's | Performance Engineering | Techfix</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            techfix: "#58C11D"
          }
        }
      }
    }
  </script>

  <style>
    html, body {
      overflow-x: hidden;
    }
  </style>
</head>

<body class="min-h-screen bg-zinc-950 text-zinc-100 selection:bg-techfix/30 selection:text-white">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 border-b border-white/10 bg-zinc-950/80 backdrop-blur-xl">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-5 py-4">
      <img src="assets/logo-light.png" class="h-10" />

      <nav class="hidden md:flex gap-7 text-sm">
        <a href="/" class="text-techfix">Home</a>
        <a href="/performance-lab/" class="text-zinc-300 hover:text-techfix">Performance Lab</a>
        <a href="/builds/" class="text-zinc-300 hover:text-techfix">Builds</a>
        <a href="/knowledge/" class="text-zinc-300 hover:text-techfix">Knowledge</a>
        <a href="/custom-build/" class="text-zinc-300 hover:text-techfix">Custom Build</a>
        <a href="/contact/" class="text-zinc-300 hover:text-techfix">Contact</a>
      </nav>

      <button id="mobile-menu-button" class="md:hidden p-3 border border-white/10 rounded-xl">
        ☰
      </button>
    </div>
  </header>

  <main>
    <section class="mx-auto max-w-6xl px-5 py-20">
      <div class="grid gap-12 lg:grid-cols-[1.05fr_0.95fr] lg:items-start">

        <!-- LEFT -->
        <div>
          <h1 class="text-5xl font-semibold leading-tight">
            High-end custom pc's.<br>
            <span class="text-techfix">Performance engineered.</span>
          </h1>

          <p class="mt-6 text-zinc-300 max-w-xl">
            Techfix ontwerpt high-performance custom pc's voor gaming, creators en AI workloads.
          </p>
        </div>

        <!-- RIGHT -->
        <div class="space-y-3">

          <!-- IMAGE -->
          <div class="overflow-hidden rounded-3xl border border-white/10">
            <img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7?auto=format&fit=crop&w=1600&q=80" />
          </div>

          <!-- GLOW BADGE -->
          <div class="relative flex w-full justify-center">
            
            <!-- glow layer -->
            <div class="absolute inset-0 rounded-full bg-techfix/20 blur-xl opacity-70"></div>

            <!-- badge -->
            <div class="relative flex w-full items-center justify-center rounded-full border border-techfix/30 bg-techfix/10 px-4 py-2 text-sm text-techfix backdrop-blur">
              Beperkt aantal builds per maand
            </div>

          </div>

        </div>
      </div>
    </section>
  </main>

</body>
</html>
